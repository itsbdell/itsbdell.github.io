<li class="item-list-entry">
  <a href="{{ include.item.url }}" class="item-link" {% if include.item.external %}target="_blank" rel="noopener noreferrer"{% endif %}>
    <div class="item-row">
      <span class="item-title">
        {{ include.item.title }}
        {% if include.item.external %}
        <span class="item-external" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </span>
        {% endif %}
      </span>
      <span class="item-date">{{ include.item.date | date: "%b %Y" }}</span>
    </div>
  </a>
</li>
