{% assign project = include.project %}
<div class="project-card">
  <a href="/projects/{{ project.slug }}/" class="project-card-link">
    <div class="project-header-row">
      <h3 class="project-title">{{ project.title }}</h3>
      <span class="project-years">{{ project.years }}</span>
    </div>
    {% if project.cover and project.cover != "" %}
      <img class="project-cover" src="{{ project.cover }}" alt="{{ project.title }}" loading="lazy">
    {% else %}
      <div class="project-fallback">
        <span class="project-fallback-title">{{ project.title }}</span>
      </div>
    {% endif %}
  </a>
  <p class="project-description">{{ project.description }}</p>
</div>
