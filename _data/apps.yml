# Source of truth for /apps.json and the /apps/ page.
# Edit this file; both the public feed and the rendered page rebuild from it.
# Spec: https://github.com/itsbdell/apps-json

- id: apps-json
  name: "apps.json"
  description: "A lightweight, decentralized standard for publishing apps. RSS for vibe-coded micro-apps."
  url: "https://apps-json.org"
  tags: [standard, feed, decentralized]
  vibe_coded: true
  forkable: true
  source: "https://github.com/itsbdell/apps-json"
  targets:
    - kind: web
      url: "https://apps-json.org"
      label: "Read the spec"
    - kind: web
      url: "https://github.com/itsbdell/apps-json"
      label: "View on GitHub"

