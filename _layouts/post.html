---
layout: default
---

<a href="/" class="back-link">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
  Back
</a>

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d %b %Y" }}</time>
      {% assign words = content | number_of_words %}
      {% assign minutes = words | divided_by: 250 %}
      {% if minutes < 1 %}{% assign minutes = 1 %}{% endif %}
      <span>&bull; {{ minutes }} min read</span>
    </div>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
